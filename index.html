<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的收藏買賣管理</title>
  <style>
    :root {
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --card: #ffffff;
      --surface: #f8fafc;
      --surface-soft: #eef2ff;
      --green: #15803d;
      --red: #b91c1c;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(160deg, #f8fbff 0%, #eef5ff 45%, #f5f7fb 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 18px;
    }
    .container { max-width: 1120px; margin: 0 auto; }
    h1 { margin: 0 0 14px; font-size: 1.7rem; }
    .panel {
      background: rgba(255, 255, 255, 0.93);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }
    .top-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      background:
        linear-gradient(160deg, #f8fafc 0%, #e6edf5 52%, #f5f9ff 100%);
      border: 2px solid #94a3b8;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.95),
        0 10px 20px rgba(15, 23, 42, 0.1);
    }
    .stat {
      background:
        radial-gradient(circle at 82% 16%, rgba(255, 255, 255, 0.78) 0%, rgba(255, 255, 255, 0) 34%),
        linear-gradient(165deg, #fdfefe 0%, #e6edf5 46%, #d8e2ee 72%, #f6f9fd 100%);
      border: 2.5px solid #7b8b9e;
      border-radius: 10px;
      padding: 10px;
      min-width: 170px;
      flex: 1 1 170px;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.9),
        inset 0 -8px 14px rgba(126, 140, 160, 0.18),
        0 8px 16px rgba(15, 23, 42, 0.14);
    }
    .profit-stat {
      margin-left: auto;
      background:
        radial-gradient(circle at 86% 18%, rgba(255, 255, 255, 0.92) 0%, rgba(255, 255, 255, 0) 34%),
        linear-gradient(145deg, #d3e3f6 0%, #f8fbff 45%, #c8daef 100%);
      border-color: #64748b;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.95),
        inset 0 -8px 14px rgba(122, 138, 160, 0.2),
        0 10px 20px rgba(30, 41, 59, 0.18),
        0 0 0 1px rgba(148, 163, 184, 0.8);
    }
    .label { color: var(--muted); font-size: 0.85rem; margin-bottom: 4px; }
    .value {
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: 0.2px;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.65);
    }
    .profit { color: var(--green); font-weight: 700; }
    .loss { color: var(--red); font-weight: 700; }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.wide { grid-column: 1 / -1; }
    .field input, .field select, .field textarea, .btn {
      background: #ffffff;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.95rem;
      width: 100%;
    }
    textarea { min-height: 64px; resize: vertical; }
    .btn { cursor: pointer; transition: 0.15s ease; }
    .btn:hover { border-color: #4b5563; transform: translateY(-1px); }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: 2px solid var(--primary-soft);
      border-color: var(--primary);
    }
    .btn.primary {
      background: linear-gradient(145deg, #2563eb 0%, #1d4ed8 100%);
      border-color: #1e40af;
      color: #ffffff;
    }
    .btn.warn { background: #fff1f2; border-color: #fecdd3; color: #be123c; }
    .btn.secondary { background: #ffffff; border-color: #cbd5e1; color: #334155; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .add-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .add-form-collapsed {
      display: none;
    }
    .cloud-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 10px;
      align-items: end;
    }
    .cloud-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .cloud-section-collapsed {
      display: none;
    }
    .cloud-status {
      margin-top: 8px;
      font-size: 0.85rem;
      color: #475569;
    }
    .export-section-collapsed {
      display: none;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      align-items: end;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 12px;
    }
    .item-card {
      background: #ffffff;
      border: 3px solid #7f90a6;
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      transition: 0.2s ease;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 4px 0 rgba(110, 124, 145, 0.7),
        0 0 0 2px rgba(255, 255, 255, 0.75),
        0 10px 18px rgba(15, 23, 42, 0.12);
    }
    .item-card:hover {
      transform: translateY(-3px);
      border-color: #64748b;
      box-shadow:
        0 5px 0 rgba(100, 116, 139, 0.85),
        0 0 0 2px rgba(255, 255, 255, 0.82),
        0 14px 24px rgba(15, 23, 42, 0.16);
    }
    .item-card.tone-platinum {
      border-color: transparent;
      background:
        radial-gradient(circle at 12% 10%, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0) 30%),
        radial-gradient(circle at 84% 16%, rgba(255, 215, 246, 0.35) 0%, rgba(255, 215, 246, 0) 36%),
        radial-gradient(circle at 80% 80%, rgba(170, 245, 255, 0.36) 0%, rgba(170, 245, 255, 0) 36%),
        linear-gradient(165deg, #fbfdff 0%, #edf3fb 36%, #d2deee 68%, #f8fcff 100%);
      background-blend-mode: screen, screen, screen, normal;
      box-shadow:
        0 2px 0 rgba(99, 116, 142, 0.45),
        0 12px 22px rgba(90, 111, 140, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.95),
        inset 0 -10px 16px rgba(121, 142, 171, 0.14);
    }
    .item-card.tone-rosegold {
      border-color: #b67a64;
      background:
        radial-gradient(circle at 78% 12%, rgba(255, 255, 255, 0.92) 0%, rgba(255, 255, 255, 0) 30%),
        repeating-conic-gradient(from 18deg at 22% 28%, rgba(255, 255, 255, 0.24) 0deg 8deg, rgba(255, 255, 255, 0) 8deg 16deg),
        linear-gradient(32deg, rgba(255, 255, 255, 0.24) 0 11%, rgba(255, 255, 255, 0) 11% 100%),
        linear-gradient(148deg, rgba(255, 255, 255, 0.18) 0 13%, rgba(255, 255, 255, 0) 13% 100%),
        repeating-linear-gradient(128deg, rgba(255, 250, 247, 0.22) 0px, rgba(255, 250, 247, 0.22) 2px, rgba(255, 250, 247, 0) 2px, rgba(255, 250, 247, 0) 16px),
        linear-gradient(165deg, #ffece4 0%, #f0bfab 42%, #cb866d 72%, #ffe3d7 100%);
      box-shadow:
        0 4px 0 rgba(164, 99, 73, 0.62),
        0 0 0 2px rgba(255, 241, 236, 0.7),
        0 14px 22px rgba(164, 99, 73, 0.23),
        inset 0 1px 0 rgba(255, 255, 255, 0.88),
        inset 0 -11px 17px rgba(138, 82, 60, 0.2);
    }
    .item-card.tone-gold {
      border-color: transparent;
      background:
        radial-gradient(circle at 82% 16%, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0) 30%),
        linear-gradient(120deg, rgba(255, 255, 255, 0.45) 0%, rgba(255, 255, 255, 0) 38%),
        linear-gradient(160deg, rgba(255, 220, 120, 0.2) 0%, rgba(255, 220, 120, 0) 40%),
        linear-gradient(165deg, #fff6bf 0%, #f7cb38 40%, #d49908 72%, #ffe78f 100%);
      box-shadow:
        0 3px 0 rgba(145, 98, 0, 0.62),
        0 14px 22px rgba(145, 98, 0, 0.24),
        0 0 0 2px rgba(248, 219, 90, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.86),
        inset 0 -10px 16px rgba(126, 84, 0, 0.15);
    }
    .item-card.tone-silver {
      border-color: #7b8b9e;
      background:
        radial-gradient(circle at 82% 14%, rgba(255, 255, 255, 0.86) 0%, rgba(255, 255, 255, 0) 30%),
        linear-gradient(122deg, rgba(255, 255, 255, 0.48) 0%, rgba(255, 255, 255, 0) 42%),
        linear-gradient(165deg, #ffffff 0%, #dfe6ef 44%, #b1bcc9 74%, #f2f6fb 100%);
      box-shadow:
        0 4px 0 rgba(95, 111, 132, 0.62),
        0 0 0 2px rgba(245, 249, 255, 0.72),
        0 12px 20px rgba(95, 111, 132, 0.19),
        inset 0 1px 0 rgba(255, 255, 255, 0.88),
        inset 0 -10px 16px rgba(96, 113, 135, 0.15);
    }
    .item-card.tone-platinum::before,
    .item-card.tone-rosegold::before,
    .item-card.tone-gold::before,
    .item-card.tone-silver::before {
      content: "";
      position: absolute;
      top: -28%;
      left: -45%;
      width: 34%;
      height: 150%;
      background: linear-gradient(
        120deg,
        rgba(255, 255, 255, 0) 0%,
        rgba(255, 255, 255, 0.38) 50%,
        rgba(255, 255, 255, 0) 100%
      );
      transform: rotate(18deg);
      pointer-events: none;
    }
    .item-card.tone-platinum::before {
      inset: 0;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 10px;
      transform: none;
      opacity: 0;
      background:
        radial-gradient(circle at 7% 14%, rgba(255, 255, 255, 1) 0 2.2px, rgba(255, 255, 255, 0) 5.5px),
        radial-gradient(circle at 12% 54%, rgba(210, 245, 255, 0.98) 0 1.9px, rgba(255, 255, 255, 0) 5px),
        radial-gradient(circle at 18% 82%, rgba(255, 225, 248, 0.98) 0 2.4px, rgba(255, 255, 255, 0) 5.8px),
        radial-gradient(circle at 24% 30%, rgba(255, 255, 255, 1) 0 1.8px, rgba(255, 255, 255, 0) 4.6px),
        radial-gradient(circle at 31% 67%, rgba(210, 245, 255, 0.96) 0 2.1px, rgba(255, 255, 255, 0) 5.4px),
        radial-gradient(circle at 38% 16%, rgba(255, 225, 248, 0.98) 0 1.7px, rgba(255, 255, 255, 0) 4.5px),
        radial-gradient(circle at 44% 88%, rgba(255, 255, 255, 1) 0 2.3px, rgba(255, 255, 255, 0) 5.9px),
        radial-gradient(circle at 52% 38%, rgba(210, 245, 255, 0.96) 0 2px, rgba(255, 255, 255, 0) 5.2px),
        radial-gradient(circle at 60% 12%, rgba(255, 225, 248, 0.95) 0 1.8px, rgba(255, 255, 255, 0) 4.8px),
        radial-gradient(circle at 68% 62%, rgba(255, 255, 255, 1) 0 2.4px, rgba(255, 255, 255, 0) 6px),
        radial-gradient(circle at 76% 26%, rgba(210, 245, 255, 0.98) 0 2px, rgba(255, 255, 255, 0) 5.2px),
        radial-gradient(circle at 84% 78%, rgba(255, 225, 248, 0.96) 0 2.2px, rgba(255, 255, 255, 0) 5.6px),
        radial-gradient(circle at 91% 44%, rgba(255, 255, 255, 1) 0 2px, rgba(255, 255, 255, 0) 5px),
        conic-gradient(from 0deg at 22% 36%, rgba(255,255,255,0) 0deg 42deg, rgba(255,255,255,0.88) 42deg 48deg, rgba(255,255,255,0) 48deg 132deg, rgba(255,255,255,0.88) 132deg 138deg, rgba(255,255,255,0) 138deg 222deg, rgba(255,255,255,0.88) 222deg 228deg, rgba(255,255,255,0) 228deg 312deg, rgba(255,255,255,0.88) 312deg 318deg, rgba(255,255,255,0) 318deg 360deg),
        conic-gradient(from 0deg at 58% 72%, rgba(255,255,255,0) 0deg 42deg, rgba(210,245,255,0.8) 42deg 48deg, rgba(255,255,255,0) 48deg 132deg, rgba(210,245,255,0.8) 132deg 138deg, rgba(255,255,255,0) 138deg 222deg, rgba(210,245,255,0.8) 222deg 228deg, rgba(255,255,255,0) 228deg 312deg, rgba(210,245,255,0.8) 312deg 318deg, rgba(255,255,255,0) 318deg 360deg),
        conic-gradient(from 0deg at 82% 24%, rgba(255,255,255,0) 0deg 42deg, rgba(255,225,248,0.82) 42deg 48deg, rgba(255,255,255,0) 48deg 132deg, rgba(255,225,248,0.82) 132deg 138deg, rgba(255,255,255,0) 138deg 222deg, rgba(255,225,248,0.82) 222deg 228deg, rgba(255,255,255,0) 228deg 312deg, rgba(255,225,248,0.82) 312deg 318deg, rgba(255,255,255,0) 318deg 360deg),
        conic-gradient(from 0deg at 18% 84%, rgba(255,255,255,0) 0deg 42deg, rgba(255,255,255,0.9) 42deg 48deg, rgba(255,255,255,0) 48deg 132deg, rgba(255,255,255,0.9) 132deg 138deg, rgba(255,255,255,0) 138deg 222deg, rgba(255,255,255,0.9) 222deg 228deg, rgba(255,255,255,0) 228deg 312deg, rgba(255,255,255,0.9) 312deg 318deg, rgba(255,255,255,0) 318deg 360deg),
        conic-gradient(from 0deg at 36% 88%, rgba(255,255,255,0) 0deg 42deg, rgba(210,245,255,0.82) 42deg 48deg, rgba(255,255,255,0) 48deg 132deg, rgba(210,245,255,0.82) 132deg 138deg, rgba(255,255,255,0) 138deg 222deg, rgba(210,245,255,0.82) 222deg 228deg, rgba(255,255,255,0) 228deg 312deg, rgba(210,245,255,0.82) 312deg 318deg, rgba(255,255,255,0) 318deg 360deg),
        conic-gradient(from 0deg at 54% 82%, rgba(255,255,255,0) 0deg 42deg, rgba(255,225,248,0.82) 42deg 48deg, rgba(255,255,255,0) 48deg 132deg, rgba(255,225,248,0.82) 132deg 138deg, rgba(255,255,255,0) 138deg 222deg, rgba(255,225,248,0.82) 222deg 228deg, rgba(255,255,255,0) 228deg 312deg, rgba(255,225,248,0.82) 312deg 318deg, rgba(255,255,255,0) 318deg 360deg),
        conic-gradient(from 0deg at 72% 86%, rgba(255,255,255,0) 0deg 42deg, rgba(255,255,255,0.9) 42deg 48deg, rgba(255,255,255,0) 48deg 132deg, rgba(255,255,255,0.9) 132deg 138deg, rgba(255,255,255,0) 138deg 222deg, rgba(255,255,255,0.9) 222deg 228deg, rgba(255,255,255,0) 228deg 312deg, rgba(255,255,255,0.9) 312deg 318deg, rgba(255,255,255,0) 318deg 360deg),
        conic-gradient(from 0deg at 88% 80%, rgba(255,255,255,0) 0deg 42deg, rgba(210,245,255,0.82) 42deg 48deg, rgba(255,255,255,0) 48deg 132deg, rgba(210,245,255,0.82) 132deg 138deg, rgba(255,255,255,0) 138deg 222deg, rgba(210,245,255,0.82) 222deg 228deg, rgba(255,255,255,0) 228deg 312deg, rgba(210,245,255,0.82) 312deg 318deg, rgba(255,255,255,0) 318deg 360deg);
      background-size: 55% 55%;
      background-repeat: repeat;
      filter: drop-shadow(0 0 2.2px rgba(255, 255, 255, 0.72))
              drop-shadow(0 0 4.8px rgba(190, 230, 255, 0.45))
              drop-shadow(0 0 6px rgba(255, 210, 245, 0.3));
      animation: platinumTwinkle 4.8s ease-in-out infinite;
    }
    .item-card.tone-platinum::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: 10px;
      border: 2.5px solid transparent;
      background:
        linear-gradient(transparent, transparent) padding-box,
        conic-gradient(
          from 0deg,
          #d6ebff 0deg,
          #f7d9ff 36deg,
          #d8fff7 72deg,
          #d4e1ff 108deg,
          #ffe8f7 144deg,
          #d8fff9 180deg,
          #dce8ff 216deg,
          #f0d8ff 252deg,
          #dcfff4 288deg,
          #d6ebff 360deg
        ) border-box;
      -webkit-mask: linear-gradient(#000 0 0) padding-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask: linear-gradient(#000 0 0) padding-box, linear-gradient(#000 0 0);
      mask-composite: exclude;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.72),
        0 0 10px rgba(176, 220, 255, 0.35),
        inset 0 0 8px rgba(255, 255, 255, 0.46);
      pointer-events: none;
    }
    .item-card.tone-platinum .thumb,
    .item-card.tone-platinum .emoji {
      border-color: rgba(148, 163, 184, 0.75);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.85),
        0 0 0 1px rgba(255, 255, 255, 0.45);
    }
    .item-card.tone-rosegold::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background:
        radial-gradient(circle at 22% 78%, rgba(255, 255, 255, 0.42) 0%, rgba(255, 255, 255, 0) 24%),
        radial-gradient(circle at 70% 24%, rgba(255, 255, 255, 0.32) 0%, rgba(255, 255, 255, 0) 22%),
        linear-gradient(120deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.3) 48%, rgba(255, 255, 255, 0) 100%);
      opacity: 0;
      animation: sparkleRoseGold 6.6s ease-in-out infinite;
      pointer-events: none;
    }
    .item-card.tone-rosegold::before {
      animation: shimmerRoseGold 7.2s ease-in-out infinite;
      opacity: 0.62;
    }
    .item-card.tone-gold::before,
    .item-card.tone-silver::before {
      animation: sheenSweep 6.6s ease-in-out infinite;
      opacity: 0.5;
    }
    .item-card.tone-gold::after {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: 12px;
      border: 3px solid transparent;
      background:
        linear-gradient(transparent, transparent) padding-box,
        conic-gradient(
          from 0deg,
          #ffe35c 0deg,
          #9ff36d 40deg,
          #59d6ff 80deg,
          #c46dff 120deg,
          #ff89c6 160deg,
          #ffd55b 200deg,
          #8ce86f 240deg,
          #5ed8ff 280deg,
          #c977ff 320deg,
          #ffe35c 360deg
        ) border-box;
      -webkit-mask: linear-gradient(#000 0 0) padding-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask: linear-gradient(#000 0 0) padding-box, linear-gradient(#000 0 0);
      mask-composite: exclude;
      box-shadow:
        0 0 0 1px rgba(255, 226, 91, 0.8),
        0 0 14px rgba(255, 226, 91, 0.42);
      pointer-events: none;
    }
    .thumb {
      width: 100%;
      height: 140px;
      border-radius: 10px;
      border: 1px solid var(--border);
      object-fit: contain;
      object-position: center;
      background: #ffffff;
      margin-bottom: 10px;
      display: block;
      padding: 4px;
    }
    .emoji {
      height: 140px;
      border-radius: 10px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      background: var(--surface-soft);
      margin-bottom: 10px;
    }
    .item-name { font-weight: 700; margin-bottom: 6px; text-align: center; color: #0f172a; }
    .tag {
      display: inline-block;
      background: #1e293b;
      color: #f8fafc;
      border: 1px solid #0f172a;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.2px;
      margin-bottom: 8px;
    }
    .meta { color: #0f172a; font-size: 0.88rem; font-weight: 700; margin: 2px 0; }
    .card-order-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .order-btn {
      border: 1px solid #f9a8d4;
      background: linear-gradient(160deg, #fff1f7 0%, #ffe4f0 100%);
      color: #be185d;
      border-radius: 999px;
      width: 40px;
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 2px 0 rgba(190, 24, 93, 0.18);
    }
    .order-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      background: linear-gradient(160deg, #ffe6f2 0%, #ffd5e8 100%);
    }
    .order-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .arrow-icon {
      width: 24px;
      height: 24px;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
    }
    .arrow-icon.down {
      transform: rotate(180deg);
    }
    .settings-fab {
      position: fixed;
      left: 16px;
      top: 16px;
      transform: none;
      z-index: 50;
      border: 1px solid #93c5fd;
      background: linear-gradient(160deg, #eff6ff 0%, #dbeafe 100%);
      color: #1e3a8a;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(30, 58, 138, 0.2);
    }
    .settings-drawer {
      position: fixed;
      left: 16px;
      top: 64px;
      transform: translateX(-120%);
      width: min(620px, calc(100vw - 34px));
      max-height: 84vh;
      overflow-y: auto;
      z-index: 49;
      padding: 8px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid #cbd5e1;
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.26);
      transition: transform 0.28s ease;
    }
    .settings-drawer.open {
      transform: translateX(0);
    }
    .settings-drawer .panel {
      margin-bottom: 10px;
      padding: 16px;
    }
    .settings-drawer .panel:last-child {
      margin-bottom: 0;
    }
    .settings-drawer .label {
      font-size: 1rem;
      font-weight: 700;
    }
    .settings-drawer .field label {
      font-size: 0.95rem;
      font-weight: 700;

  <script>
    const STORAGE_KEY = "collection_items_v2";
    const LEGACY_KEY = "collection_items_v1";
    const CLOUD_CONFIG_KEY = "collection_cloud_config_v1";
    const CLOUD_LAST_USED_KEY = "collection_cloud_last_used_v1";
    const ARROW_ICON_URL = "file:///C:/Users/David%20shih/.cursor/projects/c-Users-David-shih-OneDrive-8888888888/assets/c__Users_David_shih_AppData_Roaming_Cursor_User_workspaceStorage_824ab4091ecef3a2cdc4f5ec5a37c259_images_image-e6692785-584a-4d99-a6b8-182a23968990.png";
    const icons = {
      鞋子: "👟",
      公仔: "🧸",
      收藏品: "📦",
      "ETB": "📮",
      "Pokemon center ETB": "🎁",
      "Pokemon TCG": "🃏",
      "Pokemon Display Box ( 36 packs )": "📚",
      "Pokemon TCG Bundle": "🧩"
    };
    function createId() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return window.crypto.randomUUID();
      }
      return "id-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 10);
    }

    const defaultItems = [
      { id: createId(), displayOrder: 1, name: "Jordan 1 Chicago", category: "鞋子", buyPrice: 9800, buyDate: "2026-03-12", source: "SNKRS", note: "首發入手", image: "", sold: false, sellPrice: null, sellDate: null },
      { id: createId(), displayOrder: 2, name: "海賊王 魯夫 GK", category: "公仔", buyPrice: 5200, buyDate: "2026-02-01", source: "蝦皮", note: "全新未拆", image: "", sold: true, sellPrice: 6800, sellDate: "2026-04-03" }
    ];

    const itemsGrid = document.getElementById("itemsGrid");
    const emptyState = document.getElementById("emptyState");
    const modal = document.getElementById("detailModal");
    const modalTitle = document.getElementById("modalTitle");
    const modalBody = document.getElementById("modalBody");
    const markSoldBtn = document.getElementById("markSoldBtn");
    const editBtn = document.getElementById("editBtn");
    const deleteBtn = document.getElementById("deleteBtn");
    const closeModalBtn = document.getElementById("closeModalBtn");

    const nameInput = document.getElementById("nameInput");
    const categoryInput = document.getElementById("categoryInput");
    const priceInput = document.getElementById("priceInput");
    const qtyInput = document.getElementById("qtyInput");
    const sizeInput = document.getElementById("sizeInput");
    const sizeField = sizeInput ? sizeInput.closest(".field") : null;
    const cardToneInput = document.getElementById("cardToneInput");
    const dateInput = document.getElementById("dateInput");
    const sourceInput = document.getElementById("sourceInput");
    const noteInput = document.getElementById("noteInput");
    const imageInput = document.getElementById("imageInput");
    const addFormSection = document.getElementById("addFormSection");
    const toggleAddFormBtn = document.getElementById("toggleAddFormBtn");
    const addBtn = document.getElementById("addBtn");
    const saveEditBtn = document.getElementById("saveEditBtn");
    const cancelEditBtn = document.getElementById("cancelEditBtn");

    const searchInput = document.getElementById("searchInput");
    const filterCategory = document.getElementById("filterCategory");
    const filterStatus = document.getElementById("filterStatus");
    const toggleExportSectionBtn = document.getElementById("toggleExportSectionBtn");
    const exportSection = document.getElementById("exportSection");
    const exportCsvBtn = document.getElementById("exportCsvBtn");
    const clearFiltersBtn = document.getElementById("clearFiltersBtn");
    const settingsFabBtn = document.getElementById("settingsFabBtn");
    const settingsDrawer = document.getElementById("settingsDrawer");
    const cloudUrlInput = document.getElementById("cloudUrlInput");
    const cloudKeyInput = document.getElementById("cloudKeyInput");
    const cloudOwnerInput = document.getElementById("cloudOwnerInput");
    const cloudSection = document.getElementById("cloudSection");
    const toggleCloudSectionBtn = document.getElementById("toggleCloudSectionBtn");
    const saveCloudConfigBtn = document.getElementById("saveCloudConfigBtn");
    const useLastCloudBtn = document.getElementById("useLastCloudBtn");
    const pullCloudBtn = document.getElementById("pullCloudBtn");
    const pushCloudBtn = document.getElementById("pushCloudBtn");
    const cloudStatus = document.getElementById("cloudStatus");

    const countValue = document.getElementById("countValue");
    const holdingValue = document.getElementById("holdingValue");
    const buyValue = document.getElementById("buyValue");
    const sellValue = document.getElementById("sellValue");
    const profitValue = document.getElementById("profitValue");

    let items = [];
    let selectedId = null;
    let editingId = null;
    let pendingImageData = "";
    let isAddFormOpen = false;
    let isCloudSectionOpen = false;
    let isExportSectionOpen = false;
    let isSettingsDrawerOpen = false;
    let cloudConfig = { url: "", key: "", owner: "" };

    function formatMoney(value) { return "$" + Number(value || 0).toLocaleString("zh-TW"); }

    function normalizeCategory(category) {
      if (category === "Pokemon ETB") return "ETB";
      return category || "收藏品";
    }

    function normalizeCardTone(tone) {
      const rawTone = String(tone || "normal");
      const valid = ["normal", "platinum", "rosegold", "gold", "silver"];
      if (valid.includes(rawTone)) return rawTone;
      if (rawTone === "gold-gloss") return "gold";
      if (rawTone === "silver-gloss") return "silver";
      return "normal";
    }

    function getCardToneLabel(tone) {
      if (tone === "platinum") return "白金色";
      if (tone === "rosegold") return "玫瑰金色";
      if (tone === "gold") return "金色";
      if (tone === "silver") return "銀色";
      return "一般沒有顏色";
    }

    function getCardToneRank(tone) {
      if (tone === "platinum") return 1;
      if (tone === "rosegold") return 2;
      if (tone === "gold") return 3;
      if (tone === "silver") return 4;
      return 5;
    }

    function normalizeItem(item) {
      const cardTone = normalizeCardTone(item.cardTone);
      return {
        id: item.id || createId(),
        displayOrder: Number(item.displayOrder || 0),
        name: item.name || "",
        category: normalizeCategory(item.category),
        cardTone: cardTone,
        size: item.size ? String(item.size) : "",
        buyPrice: Number(item.buyPrice || 0),
        qty: Math.max(1, Number(item.qty || 1)),
        buyDate: item.buyDate || "",
        source: item.source || "",
        note: item.note || "",
        image: item.image || "",
        sold: Boolean(item.sold),
        sellPrice: item.sellPrice == null ? null : Number(item.sellPrice),
        sellDate: item.sellDate || null
      };
    }

    function withNormalizedOrder(list) {
      const hasOrder = list.every(function(item) {
        return Number.isFinite(item.displayOrder) && item.displayOrder > 0;
      });
      const base = hasOrder ? list.slice().sort(function(a, b) { return a.displayOrder - b.displayOrder; }) : list.slice();
      return base.map(function(item, index) {
        return { ...item, displayOrder: index + 1 };
      });
    }

    function reindexItemOrder() {
      items = items.map(function(item, index) {
        return { ...item, displayOrder: index + 1 };
      });
    }

    function loadItems() {
      const rawCurrent = localStorage.getItem(STORAGE_KEY);
      const rawLegacy = localStorage.getItem(LEGACY_KEY);
      const seed = rawCurrent || rawLegacy;
      if (!seed) return withNormalizedOrder(defaultItems.map(normalizeItem));
      try {
        const parsed = JSON.parse(seed);
        if (!Array.isArray(parsed)) return withNormalizedOrder(defaultItems.map(normalizeItem));
        return withNormalizedOrder(parsed.map(normalizeItem));
      } catch {
        return withNormalizedOrder(defaultItems.map(normalizeItem));
      }
    }

    function saveItems() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function loadCloudConfig() {
      const raw = localStorage.getItem(CLOUD_CONFIG_KEY);
      if (!raw) return { url: "", key: "", owner: "" };
      try {
        const parsed = JSON.parse(raw);
        return {
          url: String(parsed.url || "").trim(),
          key: String(parsed.key || "").trim(),
          owner: String(parsed.owner || "").trim()
        };
      } catch {
        return { url: "", key: "", owner: "" };
      }
    }

    function loadLastUsedCloudConfig() {
      const raw = localStorage.getItem(CLOUD_LAST_USED_KEY);
      if (!raw) return null;
      try {
        const parsed = JSON.parse(raw);
        const cfg = {
          url: String(parsed.url || "").trim(),
          key: String(parsed.key || "").trim(),
          owner: String(parsed.owner || "").trim()
        };
        return (cfg.url && cfg.key && cfg.owner) ? cfg : null;
      } catch {
        return null;
      }
    }

    function rememberLastUsedCloudConfig() {
      if (!isCloudReady()) return;
      localStorage.setItem(CLOUD_LAST_USED_KEY, JSON.stringify(cloudConfig));
    }

    function applyCloudConfigToInputs(config) {
      cloudUrlInput.value = config.url;
      cloudKeyInput.value = config.key;
      cloudOwnerInput.value = config.owner;
      cloudConfig = {
        url: config.url.trim().replace(/\/+$/, ""),
        key: config.key.trim(),
        owner: config.owner.trim()
      };
    }

    function refreshCloudConfigFromInputs() {
      cloudConfig = {
        url: cloudUrlInput.value.trim().replace(/\/+$/, ""),
        key: cloudKeyInput.value.trim(),
        owner: cloudOwnerInput.value.trim()
      };
    }

    function saveCloudConfig() {
      refreshCloudConfigFromInputs();
      localStorage.setItem(CLOUD_CONFIG_KEY, JSON.stringify(cloudConfig));
      rememberLastUsedCloudConfig();
      setCloudStatus(isCloudReady() ? "雲端設定已儲存，可載入/同步。" : "雲端設定不完整。");
    }

    function useLastCloudConfig() {
      const last = loadLastUsedCloudConfig();
      if (!last) {
        setCloudStatus("沒有可用的上次使用設定。", true);
        return;
      }
      applyCloudConfigToInputs(last);
      localStorage.setItem(CLOUD_CONFIG_KEY, JSON.stringify(cloudConfig));
      setCloudStatus("已套用上次使用設定。");
    }

    function isCloudReady() {
      return Boolean(cloudConfig.url && cloudConfig.key && cloudConfig.owner);
    }

    function setCloudStatus(message, isError) {
      cloudStatus.textContent = message;
      cloudStatus.style.color = isError ? "#b91c1c" : "#475569";
    }

    async function supabaseRequest(method, path, body, extraHeaders) {
      const headers = {
        "apikey": cloudConfig.key,
        "Authorization": "Bearer " + cloudConfig.key,
        ...extraHeaders
      };
      if (body !== undefined) headers["Content-Type"] = "application/json";
      const res = await fetch(cloudConfig.url + "/rest/v1/" + path, {
        method: method,
        headers: headers,
        body: body === undefined ? undefined : JSON.stringify(body)
      });
      if (!res.ok) {
        const text = await res.text();
        throw new Error("Supabase " + res.status + " " + text);
      }
      if (res.status === 204) return null;
      const text = await res.text();
      if (!text) return null;
      try {
        return JSON.parse(text);
      } catch (error) {
        throw new Error("Supabase 回傳格式錯誤：" + error.message);
      }
    }

    async function upsertItemToCloud(item) {
      if (!isCloudReady()) return;
      await supabaseRequest(
        "POST",
        "collection_items?on_conflict=owner_id,item_id",
        [{ owner_id: cloudConfig.owner, item_id: item.id, item_json: item }],
        { "Prefer": "resolution=merge-duplicates,return=minimal" }
      );
    }

    async function deleteItemFromCloud(itemId) {
      if (!isCloudReady()) return;
      await supabaseRequest(
        "DELETE",
        "collection_items?owner_id=eq." + encodeURIComponent(cloudConfig.owner) + "&item_id=eq." + encodeURIComponent(itemId),
        undefined,
        { "Prefer": "return=minimal" }
      );
    }

    async function pullCloudItems(isAuto) {
      if (!isAuto) refreshCloudConfigFromInputs();
      if (!isCloudReady()) {
        setCloudStatus("請先填 Supabase URL / Anon Key / 帳本代號。", true);
        return;
      }
      try {
        setCloudStatus(isAuto ? "自動載入雲端資料中..." : "載入雲端資料中...");
        const rows = await supabaseRequest(
          "GET",
          "collection_items?owner_id=eq." + encodeURIComponent(cloudConfig.owner) + "&select=item_json",
          undefined
        );
        const cloudItems = Array.isArray(rows) ? rows.map(function(row) { return normalizeItem(row.item_json || {}); }) : [];
        items = withNormalizedOrder(cloudItems);
        saveItems();
        rememberLastUsedCloudConfig();
        renderItems();
        setCloudStatus((isAuto ? "已自動載入雲端資料，共 " : "已載入雲端資料，共 ") + items.length + " 筆。");
      } catch (error) {
        setCloudStatus((isAuto ? "自動載入雲端失敗：" : "載入雲端失敗：") + error.message, true);
      }
    }

    async function pushAllToCloud(isSilent) {
      if (!isSilent) refreshCloudConfigFromInputs();
      if (!isCloudReady()) {
        if (!isSilent) setCloudStatus("請先填 Supabase URL / Anon Key / 帳本代號。", true);
        return;
      }
      try {
        if (!isSilent) setCloudStatus("推送本機資料到雲端中...");
        for (const item of items) {
          await upsertItemToCloud(item);
        }
        rememberLastUsedCloudConfig();
        if (!isSilent) setCloudStatus("推送完成，共同步 " + items.length + " 筆。");
      } catch (error) {
        if (!isSilent) setCloudStatus("推送雲端失敗：" + error.message, true);
        throw error;
      }
    }

    function calcRealizedProfit() {
      return items.filter(function(item) { return item.sold; }).reduce(function(sum, item) {
        return sum + ((Number(item.sellPrice || 0) - Number(item.buyPrice || 0)) * Number(item.qty || 1));
      }, 0);
    }

    function updateStats() {
      countValue.textContent = String(items.length);
      holdingValue.textContent = String(items.filter(function(item) { return !item.sold; }).length);
      buyValue.textContent = formatMoney(items.reduce(function(sum, item) {
        return sum + (Number(item.buyPrice || 0) * Number(item.qty || 1));
      }, 0));
      sellValue.textContent = formatMoney(items.filter(function(item) { return item.sold; }).reduce(function(sum, item) {
        return sum + (Number(item.sellPrice || 0) * Number(item.qty || 1));
      }, 0));
      const realized = calcRealizedProfit();
      profitValue.textContent = formatMoney(realized);
      profitValue.className = "value " + (realized >= 0 ? "profit" : "loss");
    }

    function getFilteredItems() {
      const q = searchInput.value.trim().toLowerCase();
      const cat = filterCategory.value;
      const status = filterStatus.value;
      return items.filter(function(item) {
        const passSearch = !q || item.name.toLowerCase().includes(q) || item.source.toLowerCase().includes(q);
        const passCategory = cat === "全部" || item.category === cat;
        const passStatus = status === "全部" || (status === "持有中" && !item.sold) || (status === "已賣出" && item.sold);
        return passSearch && passCategory && passStatus;
      }).sort(function(a, b) {
        const toneDiff = getCardToneRank(a.cardTone) - getCardToneRank(b.cardTone);
        if (toneDiff !== 0) return toneDiff;
        return Number(a.displayOrder || 0) - Number(b.displayOrder || 0);
      });
    }

    function renderCardImage(item) {
      if (item.image) return '<img class="thumb card-media" src="' + item.image + '" alt="' + escapeHtml(item.name) + '">';
      return '<div class="emoji card-media">' + (icons[item.category] || "📦") + "</div>";
    }

    function renderItems() {
      const filtered = getFilteredItems();
      itemsGrid.innerHTML = "";
      emptyState.hidden = filtered.length > 0;
      filtered.forEach(function(item) {
        const itemIndex = items.findIndex(function(x) { return x.id === item.id; });
        const card = document.createElement("article");
        card.className = "item-card";
        if (item.cardTone === "platinum") card.classList.add("tone-platinum");
        if (item.cardTone === "rosegold") card.classList.add("tone-rosegold");
        if (item.cardTone === "gold") card.classList.add("tone-gold");
        if (item.cardTone === "silver") card.classList.add("tone-silver");
        card.innerHTML =
          renderCardImage(item) +
          '<div class="item-name">' + escapeHtml(item.name) + "</div>" +
          '<div class="tag">' + item.category + "</div>" +
          (item.category === "鞋子" && item.size ? '<div class="meta">Size：' + escapeHtml(item.size) + "</div>" : "") +
          '<div class="meta">單價：' + formatMoney(item.buyPrice) + "</div>" +
          '<div class="meta">數量：' + Number(item.qty || 1) + "</div>" +
          '<div class="meta">買入總額：' + formatMoney(Number(item.buyPrice || 0) * Number(item.qty || 1)) + "</div>" +
          '<div class="meta">日期：' + (item.buyDate || "-") + "</div>" +
          '<div class="meta">狀態：' + (item.sold ? "已賣出" : "持有中") + "</div>" +
          '<div class="card-order-actions">' +
          '<button class="order-btn move-up-btn" title="上移" ' + (itemIndex <= 0 ? "disabled" : "") + '><img class="arrow-icon" src="' + ARROW_ICON_URL + '" alt="上移"></button>' +
          '<button class="order-btn move-down-btn" title="下移" ' + (itemIndex >= items.length - 1 ? "disabled" : "") + '><img class="arrow-icon down" src="' + ARROW_ICON_URL + '" alt="下移"></button>' +
          "</div>";
        const upBtn = card.querySelector(".move-up-btn");
        const downBtn = card.querySelector(".move-down-btn");
        const media = card.querySelector(".card-media");
        if (media) {
          media.addEventListener("click", function(event) {
            event.stopPropagation();
            beginEdit(item.id);
          });
        }
        if (upBtn) {
          upBtn.addEventListener("click", function(event) {
            event.stopPropagation();
            moveItem(item.id, -1);
          });
        }
        if (downBtn) {
          downBtn.addEventListener("click", function(event) {
            event.stopPropagation();
            moveItem(item.id, 1);
          });
        }
        card.addEventListener("click", function() { openDetail(item.id); });
        itemsGrid.appendChild(card);
      });
      updateStats();
    }

    async function moveItem(id, direction) {
      const index = items.findIndex(function(item) { return item.id === id; });
      if (index < 0) return;
      const target = index + direction;
      if (target < 0 || target >= items.length) return;
      const temp = items[index];
      items[index] = items[target];
      items[target] = temp;
      reindexItemOrder();
      saveItems();
      renderItems();
      if (isCloudReady()) {
        try {
          await pushAllToCloud(true);
          setCloudStatus("卡片順序已同步到雲端。");
        } catch (error) {
          setCloudStatus("卡片順序已更新，但雲端同步失敗：" + error.message, true);
        }
      }
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function openDetail(id) {
      selectedId = id;
      const item = items.find(function(x) { return x.id === id; });
      if (!item) return;
      const qty = Number(item.qty || 1);
      const buyTotal = Number(item.buyPrice || 0) * qty;
      const sellTotal = Number(item.sellPrice || 0) * qty;
      const profit = sellTotal - buyTotal;
      modalTitle.textContent = (icons[item.category] || "📦") + " " + item.name;
      const imageBlock = item.image ? '<img class="detail-image" src="' + item.image + '" alt="' + escapeHtml(item.name) + '">' : "";
      modalBody.innerHTML =
        imageBlock +
        '<div class="detail-row"><div class="detail-label">類別</div><div>' + item.category + "</div></div>" +
        (item.category === "鞋子" ? '<div class="detail-row"><div class="detail-label">鞋碼 size</div><div>' + escapeHtml(item.size || "-") + "</div></div>" : "") +
        '<div class="detail-row"><div class="detail-label">卡片顏色</div><div>' + getCardToneLabel(item.cardTone) + "</div></div>" +
        '<div class="detail-row"><div class="detail-label">買入單價</div><div>' + formatMoney(item.buyPrice) + "</div></div>" +
        '<div class="detail-row"><div class="detail-label">數量</div><div>' + qty + "</div></div>" +
        '<div class="detail-row"><div class="detail-label">買入總額</div><div>' + formatMoney(buyTotal) + "</div></div>" +
        '<div class="detail-row"><div class="detail-label">買入日期</div><div>' + (item.buyDate || "-") + "</div></div>" +
        '<div class="detail-row"><div class="detail-label">購買通路</div><div>' + escapeHtml(item.source || "-") + "</div></div>" +
        '<div class="detail-row"><div class="detail-label">備註</div><div>' + escapeHtml(item.note || "-") + "</div></div>" +
        '<div class="detail-row"><div class="detail-label">目前狀態</div><div>' + (item.sold ? "已賣出" : "持有中") + "</div></div>" +
        (item.sold ? '<div class="sell-info">' +
          '<div class="detail-row"><div class="detail-label">賣出單價</div><div>' + formatMoney(item.sellPrice) + "</div></div>" +
          '<div class="detail-row"><div class="detail-label">賣出總額</div><div>' + formatMoney(sellTotal) + "</div></div>" +
          '<div class="detail-row"><div class="detail-label">賣出日期</div><div>' + (item.sellDate || "-") + "</div></div>" +
          '<div class="detail-row"><div class="detail-label">本筆損益</div><div class="' + (profit >= 0 ? "profit" : "loss") + '">' + formatMoney(profit) + "</div></div>" +
          "</div>" : "");
      markSoldBtn.style.display = item.sold ? "none" : "inline-block";
      if (typeof modal.showModal === "function") modal.showModal();
    }

    function resetForm() {
      nameInput.value = "";
      categoryInput.value = "鞋子";
      priceInput.value = "";
      qtyInput.value = "1";
      sizeInput.value = "";
      updateSizeFieldVisibility();
      cardToneInput.value = "normal";
      dateInput.value = "";
      sourceInput.value = "";
      noteInput.value = "";
      imageInput.value = "";
      pendingImageData = "";
    }

    function setAddFormOpen(open) {
      isAddFormOpen = open;
      addFormSection.style.display = open ? "block" : "none";
      if (editingId) {
        toggleAddFormBtn.textContent = "編輯中";
      } else {
        toggleAddFormBtn.textContent = open ? "收起新增欄位" : "新增收藏";
      }
    }

    function setCloudSectionOpen(open) {
      isCloudSectionOpen = open;
      cloudSection.style.display = open ? "block" : "none";
      toggleCloudSectionBtn.textContent = open ? "收起雲端細項" : "載入雲端";
    }

    function setExportSectionOpen(open) {
      isExportSectionOpen = open;
      exportSection.style.display = open ? "block" : "none";
      toggleExportSectionBtn.textContent = open ? "收起匯出" : "匯出 CSV";
    }

    function setSettingsDrawerOpen(open) {
      isSettingsDrawerOpen = open;
      settingsDrawer.classList.toggle("open", open);
      settingsFabBtn.textContent = open ? "✕ 關閉" : "⚙ 設定";
    }

    function updateSizeFieldVisibility() {
      if (!sizeField) return;
      const isShoe = categoryInput.value === "鞋子";
      sizeField.style.display = isShoe ? "block" : "none";
      if (!isShoe) sizeInput.value = "";
    }

    function scrollElementToViewportCenter(element) {
      if (!element) return;
      const rect = element.getBoundingClientRect();
      const targetTop = window.scrollY + rect.top - (window.innerHeight / 2) + (rect.height / 2);
      window.scrollTo({ top: Math.max(0, targetTop), behavior: "smooth" });
    }

    function beginEdit(id) {
      const item = items.find(function(x) { return x.id === id; });
      if (!item) return;
      setSettingsDrawerOpen(true);
      editingId = id;
      nameInput.value = item.name;
      categoryInput.value = item.category;
      priceInput.value = String(item.buyPrice);
      qtyInput.value = String(item.qty || 1);
      sizeInput.value = item.size || "";
      updateSizeFieldVisibility();
      cardToneInput.value = item.cardTone || "normal";
      dateInput.value = item.buyDate || "";
      sourceInput.value = item.source || "";
      noteInput.value = item.note || "";
      imageInput.value = "";
      pendingImageData = item.image || "";
      setAddFormOpen(true);
      addBtn.style.display = "none";
      saveEditBtn.style.display = "inline-block";
      cancelEditBtn.style.display = "inline-block";
      if (modal.open) modal.close();
      requestAnimationFrame(function() {
        scrollElementToViewportCenter(addFormSection);
      });
    }

    function endEdit() {
      editingId = null;
      addBtn.style.display = "inline-block";
      saveEditBtn.style.display = "none";
      cancelEditBtn.style.display = "none";
      setAddFormOpen(false);
      resetForm();
    }

    function collectFormData() {
      const name = nameInput.value.trim();
      const category = categoryInput.value;
      const cardTone = cardToneInput.value;
      const buyPrice = Number(priceInput.value);
      const qty = Number(qtyInput.value);
      const size = category === "鞋子" ? sizeInput.value.trim() : "";
      const buyDate = dateInput.value;
      const source = sourceInput.value.trim();
      const note = noteInput.value.trim();
      if (!name) { alert("請輸入品項名稱"); return null; }
      if (!Number.isFinite(buyPrice) || buyPrice <= 0) { alert("請輸入正確買入價格"); return null; }
      if (!Number.isInteger(qty) || qty <= 0) { alert("請輸入正確數量"); return null; }
      return { name: name, category: category, cardTone: cardTone, buyPrice: buyPrice, qty: qty, size: size, buyDate: buyDate, source: source, note: note };
    }

    async function addItem() {
      const data = collectFormData();
      if (!data) return;
      const newItem = {
        id: createId(),
        displayOrder: 1,
        name: data.name,
        category: data.category,
        cardTone: data.cardTone,
        size: data.size,
        buyPrice: data.buyPrice,
        qty: data.qty,
        buyDate: data.buyDate,
        source: data.source,
        note: data.note,
        image: pendingImageData || "",
        sold: false,
        sellPrice: null,
        sellDate: null
      };
      items.unshift(newItem);
      reindexItemOrder();
      saveItems();
      try {
        await upsertItemToCloud(newItem);
        if (isCloudReady()) setCloudStatus("新增已同步到雲端。");
      } catch (error) {
        setCloudStatus("新增成功，但雲端同步失敗：" + error.message, true);
      }
      resetForm();
      setAddFormOpen(false);
      setExportSectionOpen(false);
      setCloudSectionOpen(false);
      setSettingsDrawerOpen(false);
      renderItems();
    }

    async function saveEdit() {
      if (!editingId) return;
      const idx = items.findIndex(function(x) { return x.id === editingId; });
      if (idx < 0) return;
      const data = collectFormData();
      if (!data) return;
      items[idx] = {
        ...items[idx],
        name: data.name,
        category: data.category,
        cardTone: data.cardTone,
        size: data.size,
        buyPrice: data.buyPrice,
        qty: data.qty,
        buyDate: data.buyDate,
        source: data.source,
        note: data.note,
        image: pendingImageData || ""
      };
      saveItems();
      try {
        await upsertItemToCloud(items[idx]);
        if (isCloudReady()) setCloudStatus("編輯已同步到雲端。");
      } catch (error) {
        setCloudStatus("編輯成功，但雲端同步失敗：" + error.message, true);
      }
      endEdit();
      setExportSectionOpen(false);
      setCloudSectionOpen(false);
      setSettingsDrawerOpen(false);
      renderItems();
    }

    async function removeItem(id) {
      const item = items.find(function(x) { return x.id === id; });
      if (!item) return;
      const ok = confirm("確定刪除「" + item.name + "」嗎？");
      if (!ok) return;
      items = items.filter(function(x) { return x.id !== id; });
      reindexItemOrder();
      saveItems();
      try {
        await deleteItemFromCloud(id);
        if (isCloudReady()) setCloudStatus("刪除已同步到雲端。");
      } catch (error) {
        setCloudStatus("刪除成功，但雲端同步失敗：" + error.message, true);
      }
      renderItems();
      if (modal.open) modal.close();
      if (editingId === id) endEdit();
    }

    async function markSelectedAsSold() {
      const idx = items.findIndex(function(x) { return x.id === selectedId; });
      if (idx < 0) return;
      const item = items[idx];
      const priceText = prompt('輸入「' + item.name + "」賣出價格：");
      if (priceText === null) return;
      const sellPrice = Number(priceText);
      if (!Number.isFinite(sellPrice) || sellPrice <= 0) return alert("賣出價格格式錯誤");
      const sellDate = prompt("輸入賣出日期（YYYY-MM-DD）：", new Date().toISOString().slice(0, 10));
      if (sellDate === null) return;
      items[idx] = { ...item, sold: true, sellPrice: sellPrice, sellDate: sellDate };
      saveItems();
      try {
        await upsertItemToCloud(items[idx]);
        if (isCloudReady()) setCloudStatus("賣出狀態已同步到雲端。");
      } catch (error) {
        setCloudStatus("賣出狀態已更新，但雲端同步失敗：" + error.message, true);
      }
      renderItems();
      openDetail(item.id);
    }

    function handleImageChange() {
      const file = imageInput.files && imageInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(event) {
        pendingImageData = String((event.target && event.target.result) || "");
      };
      reader.readAsDataURL(file);
    }

    function exportCsv() {
      const header = ["名稱", "類別", "買入價格", "數量", "買入日期", "購買通路", "備註", "狀態", "賣出價格", "賣出日期", "損益"];
      const rows = items.map(function(item) {
        const pnl = item.sold ? (Number(item.sellPrice || 0) - Number(item.buyPrice || 0)) * Number(item.qty || 1) : "";
        return [
          item.name,
          item.category,
          item.buyPrice,
          item.qty || 1,
          item.buyDate || "",
          item.source || "",
          item.note || "",
          item.sold ? "已賣出" : "持有中",
          item.sellPrice == null ? "" : item.sellPrice,
          item.sellDate || "",
          pnl
        ];
      });
      const csv = [header].concat(rows).map(function(row) {
        return row.map(function(cell) {
          const text = String(cell == null ? "" : cell).replace(/"/g, '""');
          return '"' + text + '"';
        }).join(",");
      }).join("\n");
      const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "collection-export.csv";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function clearFilters() {
      searchInput.value = "";
      filterCategory.value = "全部";
      filterStatus.value = "全部";
      renderItems();
    }

    addBtn.addEventListener("click", addItem);
    categoryInput.addEventListener("change", updateSizeFieldVisibility);
    settingsFabBtn.addEventListener("click", function() {
      setSettingsDrawerOpen(!isSettingsDrawerOpen);
    });
    toggleAddFormBtn.addEventListener("click", function() {
      if (editingId) return;
      setAddFormOpen(!isAddFormOpen);
    });
    saveEditBtn.addEventListener("click", saveEdit);
    cancelEditBtn.addEventListener("click", endEdit);
    markSoldBtn.addEventListener("click", markSelectedAsSold);
    editBtn.addEventListener("click", function() { if (selectedId) beginEdit(selectedId); });
    deleteBtn.addEventListener("click", function() { if (selectedId) removeItem(selectedId); });
    closeModalBtn.addEventListener("click", function() { modal.close(); });
    searchInput.addEventListener("input", renderItems);
    filterCategory.addEventListener("change", renderItems);
    filterStatus.addEventListener("change", renderItems);
    exportCsvBtn.addEventListener("click", exportCsv);
    toggleExportSectionBtn.addEventListener("click", function() {
      setExportSectionOpen(!isExportSectionOpen);
    });
    clearFiltersBtn.addEventListener("click", clearFilters);
    saveCloudConfigBtn.addEventListener("click", saveCloudConfig);
    useLastCloudBtn.addEventListener("click", useLastCloudConfig);
    toggleCloudSectionBtn.addEventListener("click", function() {
      if (isCloudSectionOpen) {
        setCloudSectionOpen(false);
        return;
      }
      setCloudSectionOpen(true);
      pullCloudItems(false);
    });
    pullCloudBtn.addEventListener("click", function() { pullCloudItems(false); });
    pushCloudBtn.addEventListener("click", function() { pushAllToCloud(false); });
    imageInput.addEventListener("change", handleImageChange);
    modal.addEventListener("click", function(event) {
      const rect = modal.getBoundingClientRect();
      const inside = rect.top <= event.clientY && event.clientY <= rect.top + rect.height && rect.left <= event.clientX && event.clientX <= rect.left + rect.width;
      if (!inside) modal.close();
    });

    cloudConfig = loadCloudConfig();
    cloudUrlInput.value = cloudConfig.url;
    cloudKeyInput.value = cloudConfig.key;
    cloudOwnerInput.value = cloudConfig.owner;
    setCloudStatus(isCloudReady() ? "已讀取雲端設定，可按「載入雲端」。" : "尚未設定雲端同步，先在上方填入資訊。");

    items = loadItems();
    saveItems();
    setAddFormOpen(false);
    setCloudSectionOpen(false);
    setExportSectionOpen(false);
    setSettingsDrawerOpen(false);
    updateSizeFieldVisibility();
    renderItems();
    if (isCloudReady()) {
      pullCloudItems(true);
    }
  </script>
</body>
</html>
